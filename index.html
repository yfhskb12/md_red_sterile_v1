<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sterile Reader</title>
    <meta name="description" content="Offline-only Markdown Viewer">
    <meta name="theme-color" content="#0f172a">
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --border: #334155;
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-stack);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            padding: 1rem;
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        h1 { font-size: 1.25rem; font-weight: 600; }

        .controls { display: flex; gap: 1rem; align-items: center; }

        /* Custom File Input */
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .btn {
            background-color: var(--accent);
            color: #0f172a;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            font-size: 0.875rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }

        .btn:hover { opacity: 0.9; }

        input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        main {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        /* Markdown Styles */
        .md-content { font-size: 1rem; }
        .md-content h1, .md-content h2, .md-content h3 { margin-top: 1.5em; margin-bottom: 0.5em; color: #fff; }
        .md-content h1 { font-size: 2em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
        .md-content h2 { font-size: 1.5em; }
        .md-content p { margin-bottom: 1em; color: var(--text-secondary); }
        .md-content ul, .md-content ol { margin-bottom: 1em; padding-left: 1.5em; color: var(--text-secondary); }
        .md-content blockquote {
            border-left: 4px solid var(--accent);
            padding-left: 1em;
            margin-left: 0;
            margin-bottom: 1em;
            color: var(--text-secondary);
            font-style: italic;
        }
        .md-content code {
            background-color: var(--bg-secondary);
            padding: 0.2em 0.4em;
            border-radius: 0.25em;
            font-family: monospace;
            font-size: 0.9em;
            color: var(--accent);
        }
        .md-content pre {
            background-color: var(--bg-secondary);
            padding: 1em;
            border-radius: 0.5em;
            overflow-x: auto;
            margin-bottom: 1em;
        }
        .md-content pre code { background-color: transparent; padding: 0; color: var(--text-primary); }
        
        /* Remote Link Styling (for images) */
        .remote-link {
            display: inline-block;
            border: 1px dashed var(--border);
            padding: 0.25rem 0.5rem;
            color: var(--accent);
            text-decoration: none;
            font-size: 0.875rem;
            margin: 0.5rem 0;
            background: rgba(56, 189, 248, 0.1);
            border-radius: 4px;
        }
        .remote-link:before { content: "🔗 "; }
        .remote-link:hover { border-color: var(--accent); }

        a { color: var(--accent); }

        #empty-state {
            text-align: center;
            color: var(--text-secondary);
            margin-top: 4rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>Sterile Reader</h1>
        <div class="controls">
            <div class="file-input-wrapper">
                <button class="btn">Open File</button>
                <input type="file" id="fileInput" accept=".md,.txt,.markdown">
            </div>
        </div>
    </header>

    <main id="content">
        <div id="empty-state">
            <p>Select a local Markdown file to read.</p>
            <p><small>No network requests will be made.</small></p>
        </div>
    </main>

    <script>
        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW Registered'))
                    .catch(err => console.log('SW Fail', err));
            });
        }

        const fileInput = document.getElementById('fileInput');
        const contentDiv = document.getElementById('content');

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const text = event.target.result;
                const html = parseMarkdown(text);
                contentDiv.innerHTML = `<div class="md-content">${html}</div>`;
            };
            reader.readAsText(file);
        });

        // Minimal, Sterile Markdown Parser
        // Rules:
        // 1. Sanitize HTML input first to prevent script injection.
        // 2. Convert standard MD syntax.
        // 3. Convert ![alt](url) to <a href="url">[Image: alt]</a> to prevent auto-loading.
        function parseMarkdown(markdown) {
            // 1. Basic Sanitation (Escape HTML tags)
            let safe = markdown
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');

            // 2. Core Parsing
            
            // Headers
            safe = safe.replace(/^###### (.*$)/gim, '<h6>$1</h6>');
            safe = safe.replace(/^##### (.*$)/gim, '<h5>$1</h5>');
            safe = safe.replace(/^#### (.*$)/gim, '<h4>$1</h4>');
            safe = safe.replace(/^### (.*$)/gim, '<h3>$1</h3>');
            safe = safe.replace(/^## (.*$)/gim, '<h2>$1</h2>');
            safe = safe.replace(/^# (.*$)/gim, '<h1>$1</h1>');

            // Bold / Italic
            safe = safe.replace(/\*\*(.*?)\*\*/gim, '<strong>$1</strong>');
            safe = safe.replace(/\*(.*?)\*/gim, '<em>$1</em>');
            safe = safe.replace(/__(.*?)__/gim, '<strong>$1</strong>');
            safe = safe.replace(/_(.*?)_/gim, '<em>$1</em>');

            // Code Blocks (Triple backtick)
            safe = safe.replace(/```([\s\S]*?)```/gim, '<pre><code>$1</code></pre>');
            
            // Inline Code
            safe = safe.replace(/`([^`]+)`/gim, '<code>$1</code>');

            // Blockquotes
            safe = safe.replace(/^\> (.*$)/gim, '<blockquote>$1</blockquote>');

            // Lists (Unordered)
            safe = safe.replace(/^\s*-\s+(.*$)/gim, '<ul><li>$1</li></ul>');
            // Fix list structure (merge adjacent uls - simple hack)
            safe = safe.replace(/<\/ul>\s*<ul>/gim, '');

            // IMAGES -> TRANSFORM TO LINKS (Security Rule)
            // Regex captures: ![alt](url)
            safe = safe.replace(/!\[([^\]]*)\]\(([^)]+)\)/gim, '<a href="$2" target="_blank" rel="noopener noreferrer" class="remote-link">[Image: $1]</a>');

            // Standard Links
            // Regex captures: [text](url)
            safe = safe.replace(/\[([^\]]+)\]\(([^)]+)\)/gim, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');

            // Paragraphs (double newline)
            safe = safe.replace(/\n\n/gim, '</p><p>');
            
            // Wrap loose text in P if not started yet (very basic)
            if(!safe.startsWith('<')) {
                safe = '<p>' + safe + '</p>';
            }

            // Clean up newlines
            safe = safe.replace(/\n/gim, '<br />');
            
            // Cleanup brs in headers/lists/pre
            safe = safe.replace(/<\/h(\d)><br \/>/gim, '</h$1>');
            safe = safe.replace(/<\/ul><br \/>/gim, '</ul>');
            safe = safe.replace(/<\/pre><br \/>/gim, '</pre>');
            safe = safe.replace(/<\/blockquote><br \/>/gim, '</blockquote>');

            return safe;
        }
    </script>
</body>
</html>
